<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Seat Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay" class="active">
        <div class="spinner"></div>
    </div>

    <header>
        <h1>Seat Availability</h1>
        <button id="reload-button" class="btn-reload">
            <span class="reload-icon">↻</span> 最新の席情報を取得
        </button>
    </header>

    <main>
        <div class="legend-container">
            <div class="legend-item"><span class="legend-badge empty"></span>空席</div>
            <div class="legend-item"><span class="legend-badge using"></span>使用中</div>
            <div class="legend-item"><span class="legend-badge away"></span>離席中</div>
            <div class="legend-item"><span class="legend-badge unregistered"></span>未登録使用中</div>
            <div class="legend-item"><span class="legend-badge problem"></span>PC不具合</div>
        </div>

        <div class="classroom-wrapper">
            <div class="seat-map-container">
                <h2>Class 1</h2>
                <div id="class1-seat-map" class="seat-map"></div>
            </div>

            <div class="seat-map-container">
                <h2>Class 2</h2>
                <div id="class2-seat-map" class="seat-map"></div>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-button">&times;</button>
            <h2 id="modal-title">座席登録</h2>
            
            <div class="modal-body">
                <input type="hidden" id="selected-seat-number">
                
                <div id="modal-input-area" class="fade-in">
                    <div class="form-group">
                        <label for="teacher-select">先生を選択</label>
                        <div class="select-wrapper">
                            <select id="teacher-select">
                                <option value="">選択してください</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="student-select">生徒を選択</label>
                        <div class="select-wrapper">
                            <select id="student-select" disabled>
                                <option value="">先生を選択してください</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="modal-leave-message" class="leave-message fade-in" style="display:none;">
                    <div class="icon-box">👋</div>
                    <p>退室しますか？</p>
                    <p class="sub-text">座席情報がクリアされます</p>
                </div>
            </div>

            <div class="modal-footer">
                <button id="register-button" class="btn btn-primary">登録する</button>
                <button id="leave-button" class="btn btn-danger">退室する</button>
                <button id="cancel-button" class="btn btn-secondary">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
